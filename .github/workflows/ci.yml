name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest fastapi pymupdf
      - run: python -m pytest -q
      - run: python -m py_compile pipeline/scripts/*.py scripts/*.py studio/main.py
      # Prove clone-and-go on both operating systems (COM-free by design).
      - run: python scripts/bootstrap.py --profile-root .ci-profile --workspace-root .ci-ws
