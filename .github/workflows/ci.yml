name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest fastapi pymupdf
      - run: python -m pytest -q
      # bash so the *.py globs expand on the Windows runner too (pwsh passes
      # them through literally and py_compile fails on the literal pattern)
      - run: python -m py_compile pipeline/scripts/*.py scripts/*.py studio/main.py
        shell: bash
      - name: Compose smoke
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          expected = {
              "full-report": [
                  "research", "design", "data_sim", "write", "humanize",
                  "content_verify", "assemble", "render_proof", "submit_verify",
              ],
              "pre-researched": [
                  "design", "data_sim", "write", "humanize", "content_verify",
                  "assemble", "render_proof", "submit_verify",
              ],
              "verify-only": ["submit_verify"],
              "assemble-only": ["assemble", "render_proof", "submit_verify"],
              "conditions-only": [
                  "topic_select", "research", "design", "data_sim", "write",
                  "humanize", "content_verify", "assemble", "render_proof",
                  "submit_verify",
              ],
              "backfill": [
                  "claim_extract", "retro_research", "content_verify",
                  "submit_verify",
              ],
          }
          ctl = Path("pipeline/scripts/pipeline_ctl.py").resolve()
          compose = Path("pipeline/scripts/compose.py").resolve()
          with tempfile.TemporaryDirectory() as temporary:
              ws = Path(temporary) / "report-compose-smoke"
              (ws / "refs").mkdir(parents=True)
              form = ws / "refs" / "form.hwpx"
              form.write_bytes(b"synthetic form")
              (ws / "request.yaml").write_text(
                  f'topic: "synthetic topic"\nform: "{form.as_posix()}"\n',
                  encoding="utf-8",
              )
              subprocess.run([
                  sys.executable, str(ctl), "init", str(ws),
                  "--slug", "compose-smoke", "--mode", "autonomous",
                  "--subject", "ci", "--topic", "synthetic topic",
                  "--form", str(form),
              ], check=True, capture_output=True, text=True, encoding="utf-8")
              (ws / "research").mkdir(exist_ok=True)
              (ws / "research" / "evidence.md").write_text(
                  "synthetic evidence\n", encoding="utf-8")
              (ws / "research" / "sources.json").write_text(
                  "[]\n", encoding="utf-8")
              (ws / "claims.yaml").write_text(
                  '{"schema":"rigorloom-claims/v1","claims":[]}\n',
                  encoding="utf-8")
              (ws / "bundle").mkdir(exist_ok=True)
              (ws / "bundle" / "content.md").write_text(
                  "synthetic content\n", encoding="utf-8")
              (ws / "output").mkdir(exist_ok=True)
              (ws / "output" / "out.hwpx").write_bytes(b"synthetic hwpx")
              (ws / "output" / "verdict_v06.json").write_text(
                  '{"proof_grade": "advisory"}\n', encoding="utf-8")
              for alias, chain in expected.items():
                  proc = subprocess.run([
                      sys.executable, str(compose), "--alias", alias,
                      "--dry",
                  ], capture_output=True, text=True, encoding="utf-8")
                  if proc.returncode != 0:
                      raise SystemExit(
                          f"{alias} failed ({proc.returncode}): {proc.stdout}{proc.stderr}")
                  payload = json.loads(proc.stdout)
                  if payload["modules"] != chain:
                      raise SystemExit(
                          f"{alias}: expected {chain}, got {payload['modules']}")

              applied = subprocess.run([
                  sys.executable, str(compose), "--alias", "full-report",
                  "--apply", str(ws),
              ], capture_output=True, text=True, encoding="utf-8")
              if applied.returncode != 0:
                  raise SystemExit(
                      f"full-report apply failed ({applied.returncode}): "
                      f"{applied.stdout}{applied.stderr}")
              applied_payload = json.loads(applied.stdout)
              mandatory = {"2.5", "5.3", "5.5", "5.7", "6"}
              if not mandatory.issubset(applied_payload["stages"]):
                  raise SystemExit(
                      f"full-report missing mandatory stages: "
                      f"{sorted(mandatory - set(applied_payload['stages']))}")
          PY
      # Prove clone-and-go on both operating systems (COM-free by design).
      - run: python scripts/bootstrap.py --profile-root .ci-profile --workspace-root .ci-ws

  render-smoke:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Install LibreOffice render dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libreoffice-writer libreoffice-java-common default-jre-headless poppler-utils

      - name: Install H2Orestart
        shell: bash
        run: |
          # Do NOT use the distro package: Ubuntu 24.04 ships
          # libreoffice-h2orestart 0.6.1, whose bundled build aborts the Java
          # HWPX import filter under LibreOffice 24.2 (LO then reports a generic
          # "Unspecified Application Error"). H2Orestart >= 0.7 fixes HWPX
          # import, so install the newest build straight from the Debian pool.
          # (The .deb keeps apt dependency resolution and the dpkg-based
          # install guard in the render step working.)
          pool=https://deb.debian.org/debian/pool/main/h/h2orestart
          deb_name="$(curl -fsSL "$pool/" \
            | grep -oE 'libreoffice-h2orestart_[^"/]+_all\.deb' \
            | sort -Vu | tail -n 1 || true)"
          if [[ -z "$deb_name" ]]; then
            echo "::error::no libreoffice-h2orestart .deb found in the Debian pool" >&2
            exit 1
          fi
          echo "Installing $deb_name"
          curl -fsSL "$pool/$deb_name" -o "$RUNNER_TEMP/h2orestart.deb"
          sudo apt-get install -y "$RUNNER_TEMP/h2orestart.deb"

      - name: Warm up LibreOffice profile and extension registration
        shell: bash
        run: |
          # H2Orestart is a Java UNO extension: its first activation after
          # install runs extension deployment/registration through LO's Java
          # bridge. Doing that here (isolated, verbose) keeps a JVM/extension
          # registration failure from surfacing later as an opaque crash
          # during the actual convert-to call.
          lo_profile="$RUNNER_TEMP/lo-profile"
          mkdir -p "$lo_profile"
          echo "::group::soffice --version"
          soffice --version
          echo "::endgroup::"
          soffice --headless "-env:UserInstallation=file://$lo_profile" --terminate_after_init
          echo "::group::unopkg list --bundled"
          unopkg list --bundled || true
          echo "::endgroup::"

      - name: Render synthetic HWPX
        shell: bash
        run: |
          dpkg-query -W -f='${Status}\n' libreoffice-h2orestart \
            | grep -Fx 'install ok installed'
          smoke_dir="$RUNNER_TEMP/hwpx-render-smoke"
          mkdir -p "$smoke_dir"
          python3 - "$smoke_dir/render-smoke.hwpx" <<'PY'
          import sys
          import zipfile

          target = sys.argv[1]
          version = '''<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <hv:HCFVersion xmlns:hv="urn:hancom:office:hwpml:version" targetApplication="WORDPROCESSOR" major="1" minor="4" micro="0" buildNumber="0" os="1" xmlVersion="1.4" application="HWP201X" appVersion="0.0.0.0"/>'''
          content_hpf = '''<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <opf:package xmlns:opf="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="uuid">
            <opf:metadata/>
            <opf:manifest>
              <opf:item id="header" href="header.xml" media-type="application/xml"/>
              <opf:item id="section0" href="section0.xml" media-type="application/xml"/>
            </opf:manifest>
            <opf:spine><opf:itemref idref="section0"/></opf:spine>
          </opf:package>'''
          header = '''<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <hh:head xmlns:hh="http://www.hancom.co.kr/hwpml/2011/head"
                   xmlns:hc="http://www.hancom.co.kr/hwpml/2011/core" version="1.4" secCnt="1">
            <hh:beginNum page="1" footnote="1" endnote="1" pic="1" tbl="1" equation="1"/>
            <hh:refList>
              <hh:fontfaces itemCnt="1">
                <hh:fontface lang="HANGUL" fontCnt="1">
                  <hh:font id="0" face="Liberation Serif" type="TTF" isEmbedded="0"/>
                </hh:fontface>
              </hh:fontfaces>
              <hh:borderFills itemCnt="1">
                <hh:borderFill id="0" threeD="0" shadow="0" centerLine="NONE" breakCellSeparateLine="0"/>
              </hh:borderFills>
              <hh:charProperties itemCnt="1">
                <hh:charPr id="0" height="1000" textColor="#000000" shadeColor="none"
                           useFontSpace="0" useKerning="0" symMark="NONE" borderFillIDRef="0">
                  <hh:fontRef hangul="0" latin="0" hanja="0" japanese="0" other="0" symbol="0" user="0"/>
                  <hh:ratio hangul="100" latin="100" hanja="100" japanese="100" other="100" symbol="100" user="100"/>
                  <hh:spacing hangul="0" latin="0" hanja="0" japanese="0" other="0" symbol="0" user="0"/>
                  <hh:relSz hangul="100" latin="100" hanja="100" japanese="100" other="100" symbol="100" user="100"/>
                  <hh:offset hangul="0" latin="0" hanja="0" japanese="0" other="0" symbol="0" user="0"/>
                </hh:charPr>
              </hh:charProperties>
              <hh:tabProperties itemCnt="1"><hh:tabPr id="0" autoTabLeft="0" autoTabRight="0"/></hh:tabProperties>
              <hh:paraProperties itemCnt="1">
                <hh:paraPr id="0" tabPrIDRef="0" condense="0" fontLineHeight="0" snapToGrid="1">
                  <hh:align horizontal="JUSTIFY" vertical="BASELINE"/>
                  <hh:heading type="NONE" idRef="0" level="0"/>
                  <hh:breakSetting breakLatinWord="KEEP_WORD" breakNonLatinWord="KEEP_WORD" widowOrphan="0"
                                   keepWithNext="0" keepLines="0" pageBreakBefore="0" lineWrap="BREAK"/>
                  <hh:lineSpacing type="PERCENT" value="160" unit="HWPUNIT"/>
                </hh:paraPr>
              </hh:paraProperties>
              <hh:styles itemCnt="1">
                <hh:style id="0" type="PARA" name="Normal" engName="Normal" paraPrIDRef="0"
                          charPrIDRef="0" nextStyleIDRef="0" langID="1042" lockForm="0"/>
              </hh:styles>
            </hh:refList>
          </hh:head>'''
          section = '''<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <hs:sec xmlns:hs="http://www.hancom.co.kr/hwpml/2011/section"
                  xmlns:hp="http://www.hancom.co.kr/hwpml/2011/paragraph">
            <hp:p id="1" paraPrIDRef="0" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0">
              <hp:run charPrIDRef="0">
                <!-- The section-definition control is mandatory: H2Orestart's
                     importer does section.findAny(Ctrl_SectionDef).get() and
                     throws NoSuchElementException (surfaced by LO as
                     "Unspecified Application Error") when no secPr is present.
                     pagePr/margin must exist too — the importer dereferences
                     secd.page when building the page style. -->
                <hp:secPr id="0" textDirection="HORIZONTAL" spaceColumns="1134" tabStop="8000" outlineShapeIDRef="1">
                  <hp:pagePr landscape="WIDELY" width="59528" height="84188" gutterType="LEFT_ONLY">
                    <hp:margin header="4252" footer="4252" gutter="0" left="8504" right="8504" top="5668" bottom="4252"/>
                  </hp:pagePr>
                </hp:secPr>
                <hp:t>render smoke 1234</hp:t>
              </hp:run>
              <hp:linesegarray><hp:lineseg textpos="0" vertpos="0" vertsize="1000" textheight="1000"
                baseline="850" spacing="600" horzpos="0" horzsize="42520" flags="393216"/></hp:linesegarray>
            </hp:p>
          </hs:sec>'''
          manifest = '''<?xml version="1.0" encoding="UTF-8"?>
          <manifest:manifest xmlns:manifest="urn:oasis:names:tc:opendocument:xmlns:manifest:1.0">
            <manifest:file-entry manifest:full-path="/" manifest:media-type="application/hwp+zip"/>
            <manifest:file-entry manifest:full-path="version.xml" manifest:media-type="application/xml"/>
            <manifest:file-entry manifest:full-path="Contents/content.hpf" manifest:media-type="application/xml"/>
            <manifest:file-entry manifest:full-path="Contents/header.xml" manifest:media-type="application/xml"/>
            <manifest:file-entry manifest:full-path="Contents/section0.xml" manifest:media-type="application/xml"/>
          </manifest:manifest>'''

          with zipfile.ZipFile(target, "w", zipfile.ZIP_DEFLATED) as archive:
              archive.writestr("mimetype", "application/hwp+zip", compress_type=zipfile.ZIP_STORED)
              archive.writestr("version.xml", version)
              archive.writestr("META-INF/manifest.xml", manifest)
              archive.writestr("Contents/content.hpf", content_hpf)
              archive.writestr("Contents/header.xml", header)
              archive.writestr("Contents/section0.xml", section)
          PY
          lo_profile="$RUNNER_TEMP/lo-profile"
          soffice --headless "-env:UserInstallation=file://$lo_profile" \
            --convert-to pdf:writer_pdf_Export \
            --outdir "$smoke_dir" "$smoke_dir/render-smoke.hwpx"
          test -s "$smoke_dir/render-smoke.pdf"
          pdftotext "$smoke_dir/render-smoke.pdf" - | grep -F "render smoke"
