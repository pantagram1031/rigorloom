version: "0.6"
stages:
  - {id: "0",   name: "form_intake",   gate: {name: "topic_pick", type: "human"},                                                                         playbook: "playbooks/stage-0.md"}
  - {id: "1",   name: "research",      gate: null,                                                                                                        playbook: "playbooks/stage-1.md"}
  - {id: "2",   name: "design",        gate: {name: "design", type: "human"},                                                                             playbook: "playbooks/stage-2.md"}
  # 2.5 layout gate — delegates to hwp-master's layout_plan_check via HWP_MASTER_SCRIPTS (check_layout.py).
  - {id: "2.5", name: "layout_plan",   gate: {name: "layout", type: "script", checker: ["python", "{PIPELINE_SCRIPTS}/check_layout.py", "{WS}"]},         playbook: "playbooks/stage-2.5.md"}
  # 3 sane gate — checker is the per-workspace sim harness (emits sim/gate_result.json).
  - {id: "3",   name: "sim",           gate: {name: "sane", type: "script", checker: ["python", "{WS}/sim/gates.py"]},                                     playbook: "playbooks/stage-3.md"}
  - {id: "4",   name: "write",         gate: {name: "draft", type: "human"},                                                                              playbook: "playbooks/stage-4.md"}
  # 4.5 content_audit gate — freeze content BEFORE assembly (see stage-4.5.md).
  - {id: "4.5", name: "content_audit", gate: {name: "content_audit", type: "script", checker: ["python", "{PIPELINE_SCRIPTS}/content_audit.py", "{WS}"]}, playbook: "playbooks/stage-4.5.md"}
  - {id: "5",   name: "assemble",      gate: null,                                                                                                        playbook: "playbooks/stage-5.md"}
  - {id: "5.3", name: "format_check",  gate: {name: "format_check", type: "script", checker: ["python", "{PIPELINE_SCRIPTS}/verify_format.py", "{WS}", "--require-output"]}, playbook: "playbooks/stage-5.md"}
  - {id: "5.5", name: "understand",    gate: {name: "understand", type: "script", checker: ["python", "{PIPELINE_SCRIPTS}/check_understanding.py", "{WS}", "--out", "{WS}/.pipeline/understanding_check.json"]}, playbook: "playbooks/stage-5.5.md"}
  - {id: "5.7", name: "final_panel",   gate: {name: "final_panel", type: "script", checker: ["python", "{PIPELINE_SCRIPTS}/check_scorecard.py", "{WS}"]},          playbook: "playbooks/stage-5.7.md"}
  - {id: "6",   name: "return",        gate: {name: "submission_preflight", type: "script", checker: ["python", "{PIPELINE_SCRIPTS}/submission_preflight.py", "{WS}"]}, playbook: "playbooks/stage-6.md"}
