schema: rigorloom-modules/v1
artifact_types: [constraints, topic, evidence_pack, claims, design, data, content_draft, content_md, form, hwpx, proof, verdict_45, verdict_6, report, edit_request, edited_report, corpus, form_template, pack_draft]
# Applying build modules retains the registered gate floor from stages.yaml:
# gate-bearing stages inside the selected span, 2.5 when Stage 2 is selected,
# and 5.3/5.5/5.7/6 when the span enters Stage 5. Module stage mappings name
# where work runs; they do not replace or weaken that floor.
modules:
  - {id: topic_select, consumes: [constraints], produces: [topic], stage: 0, gates: [topic_pick], os: any, status: active}
  - {id: research, consumes: [topic], produces: [evidence_pack, claims], stage: 1, gates: [], os: any, status: active}
  - {id: claim_extract, consumes: [content_md], produces: [claims], stage: pipeline/scripts/claims_ledger.py claim_extract, gates: [], os: any, status: active}
  - {id: retro_research, consumes: [claims], produces: [evidence_pack, claims], stage: 1, gates: [check_claims], os: any, status: active}
  - {id: design, consumes: [topic, evidence_pack], produces: [design], stage: 2, gates: [design], os: any, status: active}
  - {id: data_sim, consumes: [design], produces: [data], stage: 3, gates: [sane], os: any, status: active}
  - {id: write, consumes: [design, evidence_pack, claims, data], produces: [content_draft], stage: 4, gates: [draft], os: any, status: active}
  - {id: humanize, consumes: [content_draft], produces: [content_md], stage: 4, gates: [], os: any, status: active}
  - {id: content_verify, consumes: [content_md], produces: [verdict_45], stage: 4.5, gates: [content_audit], os: any, status: active}
  - {id: assemble, consumes: [content_md, form, verdict_45], produces: [hwpx], stage: 5, gates: [], os: tiered, status: active}
  # Render probing/proof routing runs in Stage 5 via doc_backend.py. Stage 5.3
  # is the separate verify_format.py gate and is retained by the applied floor.
  - {id: render_proof, consumes: [hwpx], produces: [proof], stage: 5, gates: [], os: tiered, status: active}
  - {id: submit_verify, consumes: [hwpx, proof, verdict_45], produces: [verdict_6], stage: 6, gates: [submission_preflight], os: any, status: active}
  - {id: content_extract, consumes: [report], produces: [content_md], stage: pipeline/scripts/content_extract.py, gates: [], os: any, status: planned}
  - {id: form_extract, consumes: [corpus], produces: [form_template], stage: pipeline/scripts/form_extract.py, gates: [], os: any, status: planned}
  - {id: style_extract, consumes: [corpus, form_template], produces: [pack_draft], stage: pipeline/scripts/style_extract.py, gates: [], os: any, status: planned}
  - {id: edit, consumes: [report, edit_request], produces: [edited_report, hwpx], stage: 2, graph: edit, gates: [edit_spec, content_audit, edit_verify, edit_accept], os: tiered, status: active}
